apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          image: 536322508049.dkr.ecr.eu-north-1.amazonaws.com/my-ecr-image
          ports:i
            - containerPort: 3000
